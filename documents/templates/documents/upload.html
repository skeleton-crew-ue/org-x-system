{% extends "base.html" %}

{% block content %}
<div class="container mt-5">

    <h2>Upload Document</h2>

    <form method="post" enctype="multipart/form-data" class="mt-3">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Upload
        </button>

        <a href="{% url 'documents:list' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>

</div>
{% endblock %}
