{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Documents</h2>
                <a href="{% url 'documents:document_upload' %}" class="btn btn-primary">
                    Add New Document
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Date</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in documents %}
                        <tr>
                            <td>{{ item.title }}</td>
                            <td>{{ item.description|truncatechars:50 }}</td>
                            <td>{{ item.uploaded_at|date:"M d, Y" }}</td>
                            <td class="text-end">
                                <a href="{% url 'documents:document_detail' item.id %}" class="btn btn-sm btn-outline-secondary">View</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4">
                                <div class="text-center py-4">
                                    <p class="text-muted">No records found yet.</p>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
{% endblock %}
