{% extends "base.html" %}

{% block content %}
<div class="container mt-5">

    <h2>{{ document.title }}</h2>

    <p class="text-muted">{{ document.description }}</p>

    <p>
        Uploaded by <strong>{{ document.uploaded_by }}</strong><br>
        On {{ document.uploaded_at }}
    </p>

    {% if document.tags.all %}
        <p>
            {% for tag in document.tags.all %}
                <span class="badge bg-secondary">{{ tag.name }}</span>
            {% endfor %}
        </p>
    {% endif %}

    <a href="{% url 'documents:document_download' document.id %}"
       class="btn btn-success">
        Download
    </a>

    <a href="{% url 'documents:list' %}"
       class="btn btn-secondary">
        Back
    </a>

</div>
{% endblock %}
