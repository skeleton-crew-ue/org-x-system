{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm border-0 col-md-8 mx-auto">
        <div class="card-body p-4">
            
            <h2 class="mb-4">Schedule New Meeting</h2>

            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    {{ form.as_p }}
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <a href="{% url 'meetings:list' %}" class="btn btn-outline-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary">Schedule Meeting</button>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
