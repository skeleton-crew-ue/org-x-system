services:
  # ── Web service ────────────────────────────────────────────────────────
  - type: web
    name: org-x-system
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: org-x-db
          property: connectionString
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  # ── Daily cron: meeting reminders ─────────────────────────────────────
  # Runs every day at 08:00 UTC.
  # Sends reminder emails for any SCHEDULED meeting starting 12–36 hours later.
  - type: cron
    name: meeting-reminders
    runtime: python
    schedule: "0 8 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py send_meeting_reminders"
    envVars:
      - key: SECRET_KEY
        fromService:
          name: org-x-system
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: org-x-db
          property: connectionString
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

databases:
  - name: org-x-db
    plan: free
