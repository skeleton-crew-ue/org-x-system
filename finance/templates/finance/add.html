{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Add Transaction - Org X System{% endblock %}

{% block content %}
  <h1 class="mb-4">Add Transaction</h1>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary">Save</button>
          <a href="{% url 'finance:list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
