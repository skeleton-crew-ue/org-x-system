{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login — Org X System{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="card-title mb-4">Member Login</h2>
        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 mt-2">Log in</button>
        </form>
        <hr>
        <p class="text-center mb-0">
          New member? <a href="{% url 'members:register' %}">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
