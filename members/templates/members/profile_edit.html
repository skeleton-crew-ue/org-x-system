{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Edit Profile — Org X System{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">Edit Profile</h2>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">Save changes</button>
            <a href="{% url 'members:profile' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
